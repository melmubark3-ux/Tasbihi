name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Limit Java/Gradle memory to prevent OOM on free runners (7GB total)
      JAVA_OPTS: "-Xmx2048m -XX:MaxMetaspaceSize=512m"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx2048m -XX:MaxMetaspaceSize=512m'"
      # Build only ARM ABIs (what real Android devices use) — cuts build time by 50%
      ORG_GRADLE_PROJECT_reactNativeArchitectures: "armeabi-v7a,arm64-v8a"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Expo Prebuild (generate android/)
        run: npx expo prebuild --platform android --clean

      - name: Configure Gradle for CI
        run: |
          cat >> android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.workers.max=1
          org.gradle.caching=true
          android.enableJetifier=false
          EOF

      - name: Build APK
        run: cd android && ./gradlew assembleRelease --no-daemon --no-parallel --max-workers=1 --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tasbihi-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
