name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Memory tuning based on community best practices for 2-core/7GB runners
      JAVA_OPTS: "-Xmx2048m -XX:MaxMetaspaceSize=512m"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx2048m -XX:MaxMetaspaceSize=512m'"
      NODE_OPTIONS: "--max-old-space-size=4096"
      # Build only ARM ABIs — cuts build time by 50%
      ORG_GRADLE_PROJECT_reactNativeArchitectures: "armeabi-v7a,arm64-v8a"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Expo Prebuild (generate android/)
        run: npx expo prebuild --platform android --clean

      - name: Configure Gradle for CI
        run: |
          # Append CI-optimized Gradle settings (leading newline prevents corruption)
          printf '\norg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m\norg.gradle.daemon=false\norg.gradle.parallel=true\norg.gradle.workers.max=2\norg.gradle.caching=true\nandroid.enableJetifier=false\n' >> android/gradle.properties

      - name: Build APK (Debug)
        run: cd android && ./gradlew assembleDebug --no-daemon --parallel --max-workers=2 --build-cache --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tasbihi-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
